name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # token: ${{ secrets.RELEASE_PLEASE_PAT }}   # uncomment + add the secret to make CI run on release PRs (GITHUB_TOKEN-authored PRs don't trigger workflows)
          # Releases are cut from main. Without this, the action defaults to the
          # repo's default branch (develop, per gitflow), so it opened its release
          # PR against develop and never tagged merges into main.
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
